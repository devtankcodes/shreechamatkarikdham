<!-- ============================================================
     head.html — REUSABLE / STATIC PARTIAL
     Contains ONLY tags that are IDENTICAL on every page.
     Per-page tags (title, description, canonical, og:*, twitter:*,
     preload hero image, JSON-LD schema) are NOT here — they live
     directly in each page's <head>, above or below this include.
     ============================================================ -->

<!-- Basic Meta -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- Resource hints -->
<link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

<!-- Icons / Favicons -->
<link rel="icon" type="image/svg+xml" href="/src/assets/icons/Shreechamatkarikdham_Logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/src/assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/src/assets/icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="any" href="/src/assets/icons/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/src/assets/icons/apple-touch-icon.png">

<!-- PWA / Manifest -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="msapplication-config" content="/browserconfig.xml">

<!-- Site-wide SEO defaults -->
<meta name="author" content="Shree Chamatkarik Dham">
<meta name="robots" content="index,follow,max-image-preview:large">
<meta name="geo.region" content="IN-GJ">
<meta name="geo.placename" content="Rajkot">
<meta name="geo.position" content="22.3039;70.8022">
<meta name="ICBM" content="22.3039,70.8022">

<!-- Open Graph — site-wide constants only -->
<meta property="og:site_name" content="Shree Chamatkarik Dham">
<meta property="og:locale" content="en_IN">
<meta property="og:image:type" content="image/webp">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter — site-wide constants only -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@shreechamatkarikdham">
<meta name="twitter:creator" content="@shreechamatkarikdham">

<!-- Theme / display behavior -->
<meta name="theme-color" content="#E65100" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="color-scheme" content="light dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Shree Chamatkarik Dham">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- Behavior / misc -->
<meta name="format-detection" content="telephone=no">
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Global Stylesheets -->
<link rel="stylesheet" href="/src/assets/css/style.css">
<link rel="stylesheet" href="/src/assets/css/components/header.css">
<link rel="stylesheet" href="/src/assets/css/components/footer.css">
